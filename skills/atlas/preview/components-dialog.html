<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px;">
  <div class="atlas-dialog" style="max-width:460px; margin:0 auto;">
    <div class="atlas-dialog-header">
      <div class="atlas-dialog-title">Delete project</div>
      <div class="atlas-dialog-desc">This action is irreversible. The project and all of its deployments will be permanently removed.</div>
    </div>
    <div class="atlas-dialog-body">
      <label style="display:block; font-size:11px; color:#aaa; margin-bottom:4px;">Type <span class="mono" style="color:#fff;">atlas-prod</span> to confirm</label>
      <input class="atlas-input" placeholder="atlas-prod" />
    </div>
    <div class="atlas-dialog-footer">
      <button class="atlas-btn atlas-btn-ghost">Cancel</button>
      <button class="atlas-btn atlas-btn-destructive">Delete project</button>
    </div>
  </div>
</div></body></html>
