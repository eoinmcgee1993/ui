<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px 24px;">
  <div style="display:flex; gap:12px; align-items:flex-start;">
    <div class="atlas-popover" style="width:240px; position:relative; box-shadow:0 8px 24px rgba(0,0,0,0.9);">
      <div class="atlas-menu-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/></svg>
        Open
        <kbd class="atlas-kbd" style="margin-left:auto;">⌘ O</kbd>
      </div>
      <div class="atlas-menu-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Duplicate
        <kbd class="atlas-kbd" style="margin-left:auto;">⌘ D</kbd>
      </div>
      <div class="atlas-menu-separator"></div>
      <div class="atlas-menu-item" style="color:#F44747;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Delete
      </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
      <div class="atlas-progress"><div class="atlas-progress-bar" style="width:62%;"></div></div>
      <div style="display:flex; gap:8px; align-items:center;">
        <div class="atlas-avatar">A</div>
        <div class="atlas-avatar">JD</div>
        <div class="atlas-avatar">MK</div>
        <span style="font-size:11px; color:#777;">3 members</span>
      </div>
      <div style="display:flex; gap:8px; align-items:center; font-size:10px; color:#777;">Progress, avatars, dividers<hr class="atlas-divider" style="flex:1;"/></div>
    </div>
  </div>
</div></body></html>
